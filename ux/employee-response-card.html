<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GhostAP Employee Response Card</title>
  <style>
    :root { color-scheme: light; font-family: Inter, system-ui, sans-serif; background:#f4f6fa; color:#1f2329; }
    body { margin:0; padding:32px; }
    header { max-width:1120px; margin:0 auto 24px; }
    h1 { margin:0 0 8px; font-size:26px; }
    .note { color:#646a73; font-size:14px; }
    main { max-width:1120px; margin:auto; display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:18px; }
    .card { background:#fff; border:1px solid #dee2e9; border-radius:12px; overflow:hidden; box-shadow:0 4px 16px #1f232912; }
    .top { display:flex; align-items:center; gap:10px; padding:15px 18px; background:#f7f8fa; border-bottom:1px solid #ebeef2; }
    .avatar { width:34px; height:34px; border-radius:50%; display:grid; place-items:center; color:#fff; background:#3370ff; font-weight:700; }
    .identity { flex:1; min-width:0; }
    .identity strong { display:block; }
    .identity small { color:#8f959e; }
    .state { border-radius:999px; padding:4px 10px; font-size:12px; font-weight:700; }
    .queued { background:#eef3ff; color:#245bdb; }
    .running { background:#e8f7ff; color:#0570c4; }
    .completed { background:#e8f8ef; color:#168554; }
    .failed { background:#fff0f0; color:#c03639; }
    .canceled { background:#f2f3f5; color:#646a73; }
    .action { background:#fff6df; color:#ad6800; }
    .body { padding:18px; }
    .task { margin:0 0 14px; font-size:16px; line-height:1.5; }
    .progress { height:7px; background:#eef0f3; border-radius:8px; overflow:hidden; margin:12px 0; }
    .progress span { display:block; height:100%; background:#3370ff; }
    .result { padding:12px; background:#f7f8fa; border-radius:8px; color:#373c43; font-size:14px; line-height:1.55; white-space:pre-wrap; }
    .warning { background:#fff8e6; color:#8f5b00; }
    .meta { display:flex; justify-content:space-between; gap:12px; margin-top:14px; color:#8f959e; font-size:12px; }
    @media (max-width:720px) { body{padding:14px} main{grid-template-columns:1fr}.top,.body{padding:14px}.meta{flex-direction:column;gap:4px} }
  </style>
</head>
<body>
  <header>
    <h1>员工任务主状态卡</h1>
    <div class="note">每个 task 仅一张卡；所有 create/patch 均由目标员工 Bot 完成。此页同时验证窄屏布局。</div>
  </header>
  <main id="cards"></main>
  <script>
    const states = [
      ['queued','排队中','等待当前员工的任务槽位','0%','已持久化，尚未开始执行'],
      ['running','执行中','正在分析仓库并运行测试','56%','已完成权限检查与 Context 快照'],
      ['completed','已完成','修复登录回调并补充回归测试','100%','完成：新增 4 个测试，所有检查通过'],
      ['failed','失败','部署预览环境','100%','失败：构建命令返回非零状态'],
      ['canceled','已取消','批量迁移旧配置','42%','已响应取消请求；已提交的副作用未被回滚'],
      ['action','需要处理','恢复重启前的未知执行','100%','执行结果未知，可能已有外部副作用。禁止自动重跑。'],
    ];
    document.querySelector('#cards').innerHTML = states.map(([cls,label,task,pct,result], i) => `
      <section class="card">
        <div class="top"><div class="avatar">柳</div><div class="identity"><strong>柳七月</strong><small>员工 Bot · Codex</small></div><span class="state ${cls}">${label}</span></div>
        <div class="body"><p class="task">${task}</p><div class="progress"><span style="width:${pct}"></span></div><div class="result ${cls==='action'?'warning':''}">${result}</div><div class="meta"><span>任务 #EMP-${100+i}</span><span>更新版本 ${i+1} · 12:4${i}</span></div></div>
      </section>`).join('');
  </script>
</body>
</html>
