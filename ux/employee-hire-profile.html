<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GhostAP 员工资料选择预览</title>
  <style>
    :root { color-scheme: light; font-family: Inter, "PingFang SC", sans-serif; color: #1f2329; background: #f5f6f7; }
    * { box-sizing: border-box; }
    body { margin: 0; padding: 40px 16px; }
    .card { max-width: 720px; margin: auto; overflow: hidden; background: white; border: 1px solid #dee0e3; border-radius: 12px; box-shadow: 0 8px 24px #1f232912; }
    header { padding: 18px 24px; color: white; background: linear-gradient(120deg, #3370ff, #245bdb); }
    header h1 { margin: 0; font-size: 20px; }
    header p { margin: 6px 0 0; opacity: .88; font-size: 13px; }
    main { padding: 22px 24px 24px; }
    .identity { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .field { padding: 12px; background: #f7f8fa; border-radius: 8px; }
    .label { display: block; margin-bottom: 5px; color: #646a73; font-size: 12px; }
    .value { font-size: 14px; font-weight: 600; }
    h2 { margin: 22px 0 9px; font-size: 14px; }
    .persona { padding: 12px 14px; border-left: 3px solid #3370ff; background: #f0f4ff; line-height: 1.6; font-size: 14px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip { padding: 6px 10px; color: #245bdb; background: #edf2ff; border: 1px solid #cddcff; border-radius: 999px; font-size: 12px; }
    .chip.permission { color: #337045; background: #edf8f0; border-color: #b7e0c0; }
    .note { margin-top: 18px; padding: 10px 12px; color: #646a73; background: #f7f8fa; border-radius: 8px; font-size: 12px; line-height: 1.55; }
    .actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
    button { padding: 9px 16px; border-radius: 6px; border: 1px solid #c9cdd4; background: white; font: inherit; }
    button.primary { color: white; border-color: #3370ff; background: #3370ff; }
    @media (max-width: 560px) { .identity { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <section class="card" aria-label="员工资料预览">
    <header>
      <h1>创建独立员工 · Atlas</h1>
      <p>系统已按所选工具生成受控资料模板</p>
    </header>
    <main>
      <div class="identity">
        <div class="field"><span class="label">职责</span><span class="value">软件工程师</span></div>
        <div class="field"><span class="label">工具 / 模型</span><span class="value">Codex · provider default</span></div>
      </div>
      <h2>工作风格</h2>
      <div class="persona">以可靠、可验证的改动交付软件；先理解现有约束，再实现、测试并清楚交接风险。</div>
      <h2>性格特征（受控选项）</h2>
      <div class="chips"><span class="chip">严谨</span><span class="chip">注重细节</span><span class="chip">主动沟通</span></div>
      <h2>能力</h2>
      <div class="chips"><span class="chip">coding</span><span class="chip">testing</span><span class="chip">review</span></div>
      <h2>权限策略 · development</h2>
      <div class="chips"><span class="chip permission">file_read</span><span class="chip permission">file_write</span><span class="chip permission">shell</span><span class="chip permission">git</span></div>
      <div class="note">资料来自版本化模板，不接受任意 system prompt。权限只能由管理员选择预定义策略；名字、性格和职责不会隐式扩权。</div>
      <div class="actions"><button>返回选择</button><button class="primary">使用推荐资料</button></div>
    </main>
  </section>
</body>
</html>
