<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow 完成卡片 Preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: #f5f6f7; color: #1f2329;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      display: flex; justify-content: center; padding: 40px 20px;
    }
    .card {
      width: min(100%, 440px);
      background: #fff; border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden;
    }
    .header-success {
      background: #34c724; color: #fff; padding: 14px 20px;
      font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px;
    }
    .header-failed {
      background: #f54a45; color: #fff; padding: 14px 20px;
      font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px;
    }
    .body { padding: 16px 20px; }
    .summary-box {
      background: #f9fafb; border-radius: 4px; padding: 10px 12px;
      font-size: 13px; line-height: 1.6; margin-bottom: 14px;
      border-left: 3px solid #34c724;
    }
    .summary-box.error { border-left-color: #f54a45; }
    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px;
    }
    .stat-item {
      background: #f4f5f9; border-radius: 4px; padding: 10px 12px; text-align: center;
    }
    .stat-value { font-size: 18px; font-weight: 600; color: #1f2329; }
    .stat-label { font-size: 11px; color: #8f959e; margin-top: 2px; }
    .phase-summary { margin-bottom: 12px; }
    .phase-row {
      display: flex; align-items: center; gap: 8px; padding: 6px 0;
      font-size: 13px; border-bottom: 1px solid #f0f0f0;
    }
    .phase-row:last-child { border-bottom: none; }
    .phase-row .icon { font-size: 14px; }
    .phase-row .name { flex: 1; }
    .phase-row .agents { color: #8f959e; font-size: 12px; }
    .phase-row .dur { color: #646a73; font-size: 12px; }
    .budget-final {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; border-top: 1px solid #eee; font-size: 12px; color: #646a73;
    }
    .budget-final .bar {
      flex: 1; height: 6px; background: #e8eaed; border-radius: 3px; overflow: hidden;
    }
    .budget-final .bar-fill { height: 100%; background: #34c724; border-radius: 3px; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Success variant -->
    <div class="header-success">
      <span>✅ Workflow 完成</span>
    </div>
    <div class="body">
      <div class="summary-box">
        用户登录模块已完成实现，包含账号密码和 OAuth 两种方式。所有测试通过，代码已提交至 feature/auth 分支。
      </div>

      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value">6</div>
          <div class="stat-label">Agent 完成</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">2m18s</div>
          <div class="stat-label">总耗时</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">520K</div>
          <div class="stat-label">Token 消耗</div>
        </div>
        <div class="stat-item">
          <div class="stat-value">3</div>
          <div class="stat-label">执行阶段</div>
        </div>
      </div>

      <div class="phase-summary">
        <div class="phase-row">
          <span class="icon">✅</span>
          <span class="name">代码分析</span>
          <span class="agents">2 agents</span>
          <span class="dur">45s</span>
        </div>
        <div class="phase-row">
          <span class="icon">✅</span>
          <span class="name">实现</span>
          <span class="agents">3 agents</span>
          <span class="dur">1m05s</span>
        </div>
        <div class="phase-row">
          <span class="icon">✅</span>
          <span class="name">测试</span>
          <span class="agents">1 agent</span>
          <span class="dur">28s</span>
        </div>
      </div>

      <div class="budget-final">
        <span>Budget: 520K / 1M (52%)</span>
        <div class="bar"><div class="bar-fill" style="width:52%"></div></div>
      </div>
    </div>
  </div>
</body>
</html>
