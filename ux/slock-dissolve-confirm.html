<!doctype html>
<html lang="zh-CN">
<meta charset="utf-8">
<title>Slock 解散确认卡预览</title>
<style>
  body { margin: 0; background: #f5f6f7; font: 14px/1.5 system-ui, sans-serif; color: #1f2329; }
  .card { width: 520px; margin: 40px auto; background: white; border-radius: 10px; box-shadow: 0 4px 18px #0001; overflow: hidden; }
  header { padding: 14px 18px; background: #fee; color: #d83931; font-weight: 700; font-size: 17px; }
  main { padding: 18px; }
  .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 18px; }
  button { border: 0; border-radius: 6px; padding: 9px; font-weight: 600; }
  .danger { background: #d83931; color: white; }
  .default { background: #eff0f1; color: #1f2329; }
</style>
<div class="card">
  <header>⚠️ 确认解散团队</header>
  <main>
    即将解散团队 <strong>Alpha</strong>，此操作将停止所有 Agent、删除飞书群并清除运行时状态，且不可撤销。
    <div class="actions"><button class="danger">确认解散</button><button class="default">取消</button></div>
  </main>
</div>
</html>
