<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spec 缓存任务卡片预览</title>
  <style>
    :root {
      color-scheme: light;
      --card: #ffffff;
      --line: #d8dee8;
      --text: #1f2937;
      --muted: #64748b;
      --blue: #1456f0;
      --red: #d83931;
      --panel-a: #eef6ff;
      --panel-b: #f7f9fc;
      --panel-c: #fff7e6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #eef1f5;
      color: var(--text);
      font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .wrap {
      width: min(760px, calc(100vw - 24px));
      margin: 24px auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
    }
    .header {
      padding: 18px 20px;
      background: #eaf3ff;
      color: #174ea6;
      font-size: 22px;
      font-weight: 700;
    }
    .body { padding: 18px 20px 20px; }
    .path {
      display: inline-block;
      max-width: 100%;
      padding: 2px 6px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      background: #f8fafc;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      overflow-wrap: anywhere;
    }
    hr {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 18px 0;
    }
    .summary {
      margin-bottom: 12px;
      color: var(--muted);
    }
    .run {
      border: 1px solid #b9d5ff;
      border-radius: 8px;
      margin: 10px 0;
      overflow: hidden;
      background: var(--panel-a);
    }
    .run:nth-of-type(2) {
      border-color: #d5dce7;
      background: var(--panel-b);
    }
    .run:nth-of-type(3) {
      border-color: #f2cf8d;
      background: var(--panel-c);
    }
    .run-head {
      padding: 10px 12px;
      font-weight: 700;
      display: flex;
      gap: 8px;
      align-items: baseline;
      justify-content: space-between;
    }
    .run-id { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    .status { color: var(--muted); font-size: 13px; font-weight: 600; }
    .run-body {
      padding: 0 12px 12px;
      background: rgba(255, 255, 255, 0.72);
    }
    .meta {
      display: grid;
      gap: 4px;
      margin: 0 0 10px;
      padding: 0;
      list-style: none;
    }
    .goal {
      margin-top: 4px;
      color: #334155;
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    button {
      height: 34px;
      padding: 0 14px;
      border-radius: 6px;
      border: 1px solid currentColor;
      background: #fff;
      font: inherit;
      font-weight: 600;
    }
    .primary { color: var(--blue); }
    .danger { color: var(--red); }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="header">📋 Spec 状态</div>
    <section class="body">
      <div>📁 <span class="path">/Users/jiataorui/workspaces/aiwork/hermes-agent</span></div>
      <hr>
      <p class="summary">发现 4 个缓存任务。每个任务的恢复和删除操作放在任务自身面板内。</p>

      <article class="run">
        <div class="run-head">
          <span><span class="run-id">82db6795</span> · running · cycle 1/1</span>
          <span class="status">可恢复</span>
        </div>
        <div class="run-body">
          <ul class="meta">
            <li>更新时间：2026-05-16 09:14</li>
            <li class="goal">目标：参考当前实现情况，再优化飞书 channel 流式体验...</li>
          </ul>
          <div class="actions">
            <button class="primary">🔄 恢复</button>
            <button class="danger">🗑 删除</button>
          </div>
        </div>
      </article>

      <article class="run">
        <div class="run-head">
          <span><span class="run-id">c91ca832</span> · 未知 · cycle 0</span>
          <span class="status">仅目录</span>
        </div>
        <div class="run-body">
          <ul class="meta">
            <li>更新时间：2026-05-16 07:52</li>
            <li>状态：缺少可恢复 state.json</li>
          </ul>
          <div class="actions">
            <button class="danger">🗑 删除</button>
          </div>
        </div>
      </article>
    </section>
  </main>
</body>
</html>
