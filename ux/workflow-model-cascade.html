<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Workflow Model Cascade Preview</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --card: #ffffff;
      --border: #d9dde3;
      --text: #1f2329;
      --muted: #646a73;
      --blue: #1456f0;
      --blue-soft: #e8efff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      max-width: 760px;
      margin: 32px auto;
      padding: 0 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .header {
      padding: 14px 18px;
      background: var(--blue);
      color: white;
      font-weight: 700;
    }
    .body { padding: 18px; }
    .step {
      white-space: pre-line;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .section {
      border-top: 1px solid var(--border);
      padding-top: 14px;
      margin-top: 14px;
    }
    label {
      display: block;
      margin: 12px 0 6px;
      color: var(--muted);
      font-weight: 600;
    }
    select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      background: white;
      color: var(--text);
      font: inherit;
    }
    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    button {
      min-height: 38px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: white;
      color: var(--text);
      padding: 8px 12px;
      font: inherit;
      cursor: default;
    }
    button.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: white;
    }
    .selected {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 6px;
      background: var(--blue-soft);
      color: #143c9e;
    }
    .hint { color: var(--muted); margin: 8px 0 0; }
    @media (max-width: 560px) {
      main { margin: 12px auto; }
      .button-row { flex-direction: column; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <main>
    <div class="card">
      <div class="header">Workflow — 选择主编排 Agent</div>
      <div class="body">
        <div class="step">Step 1 / 3 — 主编排 Agent
▶ 1. 主编排 Agent — 当前
○ 2. 评审 Agent
○ 3. 自动生成并执行</div>

        <div class="section">
          <strong>需求</strong>：修复 /wf 模型选择慢和 Traex 模型列表过长的问题
        </div>

        <div class="section">
          <strong>选择工具与模型</strong>
          <label for="tool">工具</label>
          <select id="tool">
            <option selected>traex (TRAE CLI)</option>
            <option>coco (字节跳动 AI)</option>
            <option>codex (OpenAI Codex)</option>
            <option>claude (Anthropic Claude CLI)</option>
          </select>

          <div class="button-row">
            <button class="primary">默认模型（推荐）</button>
          </div>

          <label for="model">模型族</label>
          <select id="model">
            <option selected>openrouter-3o</option>
            <option>openrouter-2o</option>
            <option>doubao-seed-2.1-pro</option>
          </select>

          <label for="profile">Profile</label>
          <select id="profile">
            <option selected>standard</option>
            <option>max</option>
          </select>

          <label for="effort">Effort</label>
          <select id="effort">
            <option selected>low</option>
            <option>medium</option>
            <option>high</option>
            <option>xhigh</option>
            <option>max</option>
          </select>

          <div class="selected">当前组合：traex · openrouter-3o/low</div>
          <div class="button-row">
            <button>取消</button>
            <button class="primary">设为主编排 Agent: openrouter-3o/low</button>
          </div>
          <p class="hint">不可拆分维度的工具会只显示模型族下拉和添加按钮。</p>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
