<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slock Status Panel Preview</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6f7; padding: 24px; display: flex; flex-direction: column; align-items: center; }
h1 { margin-bottom: 24px; color: #1f2329; font-size: 20px; }
.card { background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.1); width: 420px; max-width: 100%; }
.card-header { padding: 12px 16px; background: #4e5bb6; color: #fff; font-weight: 600; font-size: 15px; }
.card-body { padding: 12px 0; }
.status-row { padding: 10px 16px; margin: 4px 12px; border-radius: 6px; font-size: 14px; color: #1f2329; font-weight: 500; }
.status-row.bg-green { background: #e8f8e5; border-left: 4px solid #34c724; }
.status-row.bg-yellow { background: #fff8e1; border-left: 4px solid #faad14; }
.status-row.bg-blue { background: #e6f0ff; border-left: 4px solid #3370ff; }
.status-row.bg-grey { background: #f0f1f2; border-left: 4px solid #8f959e; }
.status-icon { margin-right: 4px; }
.card-actions { padding: 12px 16px; border-top: 1px solid #f0f1f2; }
.btn-refresh { display: inline-block; padding: 6px 16px; background: #3370ff; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
.btn-refresh:hover { background: #245bdb; }
.legend { margin-top: 20px; font-size: 12px; color: #646a73; text-align: center; }
.legend span { margin: 0 8px; }
@media (max-width: 480px) {
  body { padding: 12px; }
  .card { width: 100%; }
}
</style>
</head>
<body>
<h1>Slock Status Panel — 状态颜色编码预览</h1>

<div class="card">
  <div class="card-header">📊 Team Alpha Agent Status</div>
  <div class="card-body">
    <!-- IDLE: green -->
    <div class="status-row bg-green">
      <span class="status-icon">🟢</span> 🔧 <strong>Coder-Alpha</strong> — Idle
    </div>
    <!-- THINKING: yellow -->
    <div class="status-row bg-yellow">
      <span class="status-icon">🟡</span> 📝 <strong>Writer-Beta</strong> — Thinking
    </div>
    <!-- RUNNING: blue -->
    <div class="status-row bg-blue">
      <span class="status-icon">🔵</span> 🔍 <strong>Reviewer-Gamma</strong> — Running
    </div>
    <!-- SENDING: grey -->
    <div class="status-row bg-grey">
      <span class="status-icon">⚪</span> 🧪 <strong>Tester-Delta</strong> — Sending
    </div>
    <!-- Another IDLE -->
    <div class="status-row bg-green">
      <span class="status-icon">🟢</span> 📋 <strong>Planner-Epsilon</strong> — Idle
    </div>
  </div>
  <div class="card-actions">
    <button class="btn-refresh">🔄 Refresh</button>
  </div>
</div>

<div class="legend">
  <span>🟢 绿色 = IDLE</span>
  <span>🟡 黄色 = THINKING</span>
  <span>🔵 蓝色 = RUNNING</span>
  <span>⚪ 灰色 = SENDING</span>
</div>
</body>
</html>
