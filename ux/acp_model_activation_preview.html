<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACP 模型激活三态预览</title>
  <style>
    :root { color-scheme: dark; font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; background: #111318; color: #f3f4f6; }
    main { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 360px)); gap: 24px; padding: 32px; justify-content: center; }
    .card { border: 1px solid #343946; border-radius: 14px; overflow: hidden; background: #1b1f27; box-shadow: 0 18px 45px rgba(0,0,0,.28); }
    .header { padding: 15px 18px; font-size: 16px; font-weight: 700; border-bottom: 1px solid #343946; }
    .loading .header { background: #173a65; }
    .ready .header { background: #174a38; }
    .failed .header { background: #632b32; }
    .body { padding: 18px; }
    .status { margin: 0 0 16px; color: #d7dbe5; line-height: 1.55; }
    .meta { display: grid; grid-template-columns: 70px 1fr; gap: 8px 12px; padding: 14px; border-radius: 10px; background: #242a34; }
    .label { color: #9da6b5; }
    .value { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; overflow-wrap: anywhere; }
    .error { margin-top: 14px; color: #ffb4b9; }
    .actions { display: flex; gap: 10px; margin-top: 18px; }
    button { flex: 1; padding: 10px 12px; border: 1px solid #4b5565; border-radius: 8px; color: #f3f4f6; background: #2a303b; font-weight: 600; }
    button.primary { border-color: #3b82f6; background: #2563eb; }
    button.danger { border-color: #ef6b73; background: #8c3038; }
  </style>
</head>
<body>
  <main>
    <section class="card loading">
      <div class="header">⏳ codex 编程模式正在初始化</div>
      <div class="body">
        <p class="status">模型选择已保存，正在后台启动 ACP 会话。当前卡片无需保持打开。</p>
        <div class="meta"><span class="label">工具</span><span class="value">codex</span><span class="label">模型</span><span class="value">gpt-5.6-sol</span></div>
      </div>
    </section>
    <section class="card ready">
      <div class="header">✅ codex 编程模式已就绪</div>
      <div class="body">
        <p class="status">ACP 会话已成功启动，现在可以直接发送需求。</p>
        <div class="meta"><span class="label">工具</span><span class="value">codex</span><span class="label">模型</span><span class="value">gpt-5.6-sol</span></div>
        <div class="actions"><button>切换模型</button></div>
      </div>
    </section>
    <section class="card failed">
      <div class="header">⚠️ codex 编程模式初始化失败</div>
      <div class="body">
        <p class="status">模型选择已保存，但 ACP 会话未能启动。</p>
        <div class="meta"><span class="label">工具</span><span class="value">codex</span><span class="label">模型</span><span class="value">gpt-5.6-sol</span></div>
        <p class="error">执行超时，请重试。</p>
        <div class="actions"><button class="danger">重试初始化</button><button>返回模型选择</button></div>
      </div>
    </section>
  </main>
</body>
</html>
